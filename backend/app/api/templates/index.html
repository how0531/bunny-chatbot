<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bunny Chatbot</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Barlow:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Localized Visualization Dependencies (Stability Patch v1.3) -->
    <script src="{{ url_for('static', filename='libs/react.min.js') }}"></script>
    <script src="{{ url_for('static', filename='libs/react-dom.min.js') }}"></script>
    <script src="{{ url_for('static', filename='libs/prop-types.min.js') }}"></script>
    <script src="{{ url_for('static', filename='libs/recharts.min.js') }}"></script>
  </head>
  <body>
    <div class="app-container">
      <header class="chat-header">
        <h1>🐰 Bunny Chatbot</h1>
        <div class="team-status">
            <div class="status-item"><span class="status-dot"></span> Sophia (PM)</div>
            <div class="status-item"><span class="status-dot"></span> Arthur (Quant)</div>
            <div class="status-item"><span class="status-dot"></span> Oscar (QA)</div>
        </div>
      </header>

      <div class="chat-window" id="chat-window">
        <div class="message bot-message">
          <div class="message-content">
            您好，我是 **Sophia**，Bunny Chatbot 的 AI 投資助理。請輸入代號（如 `2330`）或產業，我們將為您啟動法人級深度分析。
          </div>
        </div>
      </div>

      <div class="quick-actions">
        <button onclick="sendQuickMessage('投資早報')">📋 投資早報</button>
        <button onclick="sendQuickMessage('市場強度分析')">🔥 市場強度</button>
        <button onclick="sendQuickMessage('2330 分析')">💎 台積電分析</button>
        <button onclick="sendQuickMessage('AI 概念分析')">🚀 AI 概念</button>
        <button onclick="sendQuickMessage('3535 漲因')">🔍 晶彩科分析</button>
      </div>

      <div class="input-area">
        <input
          type="text"
          id="user-input"
          placeholder="輸入代號或指令 (如: 2330)..."
          autocomplete="off"
          onkeypress="if(event.key === 'Enter') sendMessage()"
        />
        <button id="send-btn" class="send-btn" onclick="sendMessage()">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}?v=1.3.1"></script>
  </body>
</html>
